<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment form</title>
</head>

<body>
    <form>
        <h1>Payment form</h1>
        <p>Please complete all the required (*) fields.</p>
        <section>
            <h1>Contact Information</h1>
            <fieldset>
                <legend>Title</legend>
                <ul>
                    <li>
                        <label for="title_1">
                            <input type="radio" id="title_1" name="title" value="king">
                            king</label>
                    </li>
                    <li>
                        <label for="title_2">
                            <input type="radio" id="title_2" name="title" value="Queen">
                            Queen</label>
                    </li>
                    <li>
                        <label for="title_3">
                            <input type="radio" id="title_3" name="title" value="Ace">
                            Ace</label>
                    </li>
                </ul>
            </fieldset>
            <p>
                <label for="user_name">Name *
                    <input type="text" id="user_name" name="name">
                </label>
            </p>
            <p>
                <label for="user_email">Email *
                    <input type="email" id="user_email" name="email">
                </label>
            </p>
            <p>
                <label for="user_password">Password *
                    <input type="password" id="user_password" name="password">
                </label>
            </p>
        </section>
        <section>
            <h1>Payment Information</h1>
            <p>
                <label for="card">
                    <span>Card type:</span>
                </label>
                <select id="card" name="user_card">
                    <option value="visa">Visa</option>
                    <option value="mc">Master card</option>
                    <option value="amex">American Express</option>
                </select>
            </p>
            <p>
                <label for="card_number">Card number *</label>
                <input type="tel" id="card_number" name="card_number">
            </p>
            <p>
                <label for="exp_date">Expire date *</label>
                <input type="text" id="exp_date" name="card_expiration" placeholder="MM/YY"
                    pattern="^(0[1-9]|1[0-2])\/([0-9]{2})$">
            </p>
        </section>
        <section>
            <p>
                <button type="submit">Validate the payment</button>
            </p>
        </section>
    </form>
</body>

</html>
